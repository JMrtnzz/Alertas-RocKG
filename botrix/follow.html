<!-- ROCKG — Alerta de Follow | Pegar en Botrix → Alerts → Followers → Custom Code -->
<!-- Imagen a subir en Botrix: RockLove.png -->
<!-- El título va fijo en el HTML; el nombre solo en {name} -->

<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@1,900&display=swap" rel="stylesheet">

<div class="container rockg-alert {disposition} {transition}">
  <div class="rockg-frame">
    <div class="alert-media-container rockg-media">
      <div class="alert-media">{img}</div>
    </div>
    <div class="alert-text-container rockg-text-wrap">
      <div class="alert-text">
        <div id="alert-message">
          <span class="rockg-tag">RocKG</span>
          <h3 class="rockg-line1">¡NUEVO SEGUIDOR!</h3>
          <span class="rockg-line2 {animation}">{name}</span>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Pegar el contenido de follow/css.css en la pestaña CSS -->
<!-- Pegar el contenido de follow/js.js en la pestaña JavaScript -->
