<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RockG Follow — Preview</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@1,900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css.css">
  <link rel="stylesheet" href="../../previews/preview-theme.css">
</head>
<body class="preview-page">
  <div class="preview-hud">
    <span class="preview-hud-tag">RocKG // PREVIEW</span>
    <span class="preview-hud-type">Seguidores</span>
  </div>
  <div class="preview-stage">
    <div class="container rockg-alert">
      <div class="rockg-frame">
        <div class="alert-media-container rockg-media">
          <div class="alert-media"><img src="../../assets/RockLove.png" alt="emote"></div>
        </div>
        <div class="alert-text-container rockg-text-wrap">
          <div class="alert-text">
            <div id="alert-message">
              <span class="rockg-tag">RocKG</span>
              <h3 class="rockg-line1">¡NUEVO SEGUIDOR!</h3>
              <span class="rockg-line2">JuanStream</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="preview-controls">
    <button class="replay-btn" type="button">↻ Reproducir</button>
    <span class="preview-note">Simulación Botrix · 800×200</span>
  </div>
  <script src="js.js"></script>
  <script src="../../previews/preview-helper.js"></script>
</body>
</html>
