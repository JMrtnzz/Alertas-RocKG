<!-- ROCKG — Alerta de Sub | Pegar en Botrix → Alerts → Subscription → Custom Code -->
<!-- Imagen a subir en Botrix: RockGG.png -->

<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@1,900&display=swap" rel="stylesheet">

<div class="container rockg-alert rockg-alert--sub {disposition} {transition}">
  <div class="rockg-frame">
    <div class="alert-media-container rockg-media">
      <div class="alert-media">{img}</div>
    </div>
    <div class="alert-text-container rockg-text-wrap">
      <div class="alert-text">
        <div id="alert-message">
          <span class="rockg-tag">RocKG</span>
          <h3 class="rockg-line1">¡NUEVA SUB!</h3>
          <span class="rockg-line2 {animation}">{name}</span>
        </div>
        <div id="custom-message" class="rockg-msg">{message}</div>
      </div>
    </div>
  </div>
</div>
